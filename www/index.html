<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>QuackTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container { text-align: center; padding: 40px; }
    .logo { font-size: 64px; margin-bottom: 20px; animation: bounce 1s ease-in-out infinite; }
    .title { font-size: 28px; font-weight: bold; margin-bottom: 10px; color: #fbbf24; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 30px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #fbbf24;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce { 
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .info { font-size: 12px; color: #555; margin-top: 20px; }
  </style>
  <script>
    // Redirect to production server
    window.location.replace('https://quacktrack.onrender.com');
  </script>
</head>
<body>
  <div class="container">
    <div class="logo">🦆</div>
    <div class="title">QuackTrack</div>
    <div class="subtitle">PTC Scheduling System</div>
    <div class="spinner"></div>
    <div class="info">Loading...</div>
  </div>
</body>
</html>
